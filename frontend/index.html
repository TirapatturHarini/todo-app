
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Todo App</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
  <script src="script.js"></script>

</head>
<body>
  <div class="container">
    <header class="header">
      <div class="header-content">
        <h1 class="title">
          <i class="fas fa-tasks"></i>
          TodoFlow
        </h1>
        <p class="subtitle">Organize your life with style</p>
      </div>
      <div class="stats">
        <div class="stat-item">
          <span class="stat-number" id="totalTodos">0</span>
          <span class="stat-label">Total</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="completedTodos">0</span>
          <span class="stat-label">Done</span>
        </div>
        <div class="stat-item">
          <span class="stat-number" id="pendingTodos">0</span>
          <span class="stat-label">Pending</span>
        </div>
      </div>
    </header>

    <main class="main-content">
      <form class="todo-form" id="todoForm">
        <div class="form-group">
          <div class="input-container">
            <i class="fas fa-plus"></i>
            <input 
              type="text" 
              id="todoTitle" 
              placeholder="What needs to be done?" 
              required
              autocomplete="off"
            >
          </div>
          <button type="submit" class="add-btn">
            <i class="fas fa-arrow-right"></i>
          </button>
        </div>
        <div class="form-group description-group">
          <div class="input-container">
            <i class="fas fa-align-left"></i>
            <input 
              type="text" 
              id="todoDescription" 
              placeholder="Add a description (optional)"
              autocomplete="off"
            >
          </div>
        </div>
      </form>

      <div class="filter-tabs">
        <button class="filter-btn active" data-filter="all">
          <i class="fas fa-list"></i>
          All
        </button>
        <button class="filter-btn" data-filter="pending">
          <i class="fas fa-clock"></i>
          Pending
        </button>
        <button class="filter-btn" data-filter="completed">
          <i class="fas fa-check-circle"></i>
          Completed
        </button>
      </div>

      <div class="todos-container">
        <div class="todos-list" id="todosList">
          <!-- Todos dynamically rendered here -->
        </div>
        
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">
            <i class="fas fa-clipboard-list"></i>
          </div>
          <h3>No todos yet</h3>
          <p>Add your first todo to get started!</p>
        </div>
      </div>
    </main>

    <div class="loading-overlay" id="loadingOverlay">
      <div class="loading-spinner">
        <i class="fas fa-spinner fa-spin"></i>
      </div>
    </div>

    <!-- Toast notifications -->
    <div class="toast-container" id="toastContainer"></div>
  </div>

  <!-- Edit Modal -->
  <div class="modal-overlay" id="editModal">
    <div class="modal">
      <div class="modal-header">
        <h3>Edit Todo</h3>
        <button class="modal-close" id="closeModal">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <form class="modal-form" id="editForm">
        <div class="form-group">
          <label for="editTitle">Title</label>
          <input type="text" id="editTitle" required>
        </div>
        <div class="form-group">
          <label for="editDescription">Description</label>
          <textarea id="editDescription" rows="3"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-secondary" id="cancelEdit">Cancel</button>
          <button type="submit" class="btn-primary">Save Changes</button>
        </div>
      </form>
    </div>
  </div>
