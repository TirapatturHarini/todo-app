apiVersion: apps/v1
kind: Deployment
metadata:
  name: todo-backend
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: todo-backend
  template:
    metadata:
      labels:
        app: todo-backend
    spec:
      containers:
        - name: backend
          image: harinitirapattur/todo-otel-app-backend:v47-hotfix
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          env:
            # Pull database credentials from Secret
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_DB
            - name: POSTGRES_HOST
              value: postgres.observability.svc.cluster.local
            - name: POSTGRES_PORT
              value: "5432"
            # CRITICAL: Set DATABASE_URL explicitly for K8s
            - name: DATABASE_URL
              value: "postgresql://todouser:todopass@postgres.observability.svc.cluster.local:5432/tododb"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: todo-backend
  namespace: observability
spec:
  selector:
    app: todo-backend
  ports:
    - port: 8080
      targetPort: 8080
