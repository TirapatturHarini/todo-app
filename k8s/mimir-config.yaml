apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-config
  namespace: observability
data:
  mimir.yaml: |
    target: all
        
    server:
      http_listen_port: 9009
      grpc_listen_port: 9095
      log_level: info
        
    common:
      storage:
        backend: filesystem
        filesystem:
          dir: /data/mimir
        
    blocks_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir/blocks
      tsdb:
        dir: /data/mimir/tsdb
        retention_period: 24h
        
    compactor:
      data_dir: /data/mimir/compactor
      sharding_ring:
        kvstore:
          store: memberlist
        
    distributor:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: memberlist
        
    ingester:
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: memberlist
        replication_factor: 1
        
    ruler_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir/rules
        
    ruler:
      rule_path: /data/mimir/rules-temp
        
    store_gateway:
      sharding_ring:
        replication_factor: 1
        kvstore:
          store: memberlist
        
    frontend:
      max_outstanding_per_tenant: 32
      log_queries_longer_than: 10s
        
    querier:
      max_concurrent: 16
        
    query_scheduler:
      max_outstanding_requests_per_tenant: 32
        
    limits:
      ingestion_rate: 10000
      ingestion_burst_size: 20000
      max_global_series_per_user: 150000
      max_global_series_per_metric: 20000
      # FIXED: Correct exemplar limits configuration
      max_global_exemplars_per_user: 100000
      # Remove these invalid fields:
      # max_exemplars_per_series_per_query: 100
      # exemplars_ingestion_rate: 1000
      # exemplars_ingestion_burst_size: 2000
      # Enable native histograms for better exemplar support
      native_histograms_ingestion_enabled: true
        
    memberlist:
      abort_if_cluster_join_fails: false
      bind_port: 7946
        
    runtime_config:
      file: /data/mimir/runtime.yaml
        
    alertmanager:
      data_dir: /data/mimir/alertmanager/data
      enable_api: true
      external_url: http://localhost:9009/alertmanager
        
    alertmanager_storage:
      backend: filesystem
      filesystem:
        dir: /data/mimir/alertmanager/storage

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mimir-runtime-config
  namespace: observability
data:
  runtime.yaml: |
    overrides:
      "tenant-1":
        max_global_exemplars_per_user: 100000
        # FIXED: Remove invalid exemplar fields for this Mimir version
        # max_exemplars_per_series_per_query: 100
        # exemplars_ingestion_rate: 1000
        # exemplars_ingestion_burst_size: 2000
        # Enable native histograms
        native_histograms_ingestion_enabled: true
