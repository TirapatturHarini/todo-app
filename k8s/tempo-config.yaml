apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-config
  namespace: observability
data:
  tempo.yaml: |
    server:
      http_listen_port: 3200
      log_level: info

    distributor:
      receivers:
        otlp:
          protocols:
            grpc:
              endpoint: 0.0.0.0:4317
            http:
              endpoint: 0.0.0.0:4318

    ingester:
      max_block_duration: 5m

    compactor:
      compaction:
        block_retention: 1h

    metrics_generator:
      registry:
        external_labels:
          source: tempo
          cluster: todo-cluster
      storage:
        path: /var/tempo/generator/wal
        remote_write:
          - url: http://mimir:9009/api/v1/push
            send_exemplars: true
            headers:
              X-Scope-OrgID: tenant-1

    storage:
      trace:
        backend: local
        wal:
          path: /var/tempo/wal
        local:
          path: /var/tempo/blocks

    query_frontend:
      search:
        duration_slo: 5s
        throughput_bytes_slo: 1.073741824e+09
      trace_by_id:
        duration_slo: 5s

    querier:
      max_concurrent_queries: 20

    overrides:
      per_tenant_override_config: /etc/tempo/overrides/overrides.yaml
      metrics_generator_processors:
        - service-graphs
        - span-metrics

--- 
apiVersion: v1
kind: ConfigMap
metadata:
  name: tempo-runtime-config
  namespace: observability
data:
  runtime.yaml: |
    {}
