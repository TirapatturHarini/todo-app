apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-app
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-app
  template:
    metadata:
      labels:
        app: metrics-app
    spec:
      containers:
        - name: metrics-app
          image: prom/statsd-exporter
          ports:
            - containerPort: 9102
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-app
  namespace: observability
spec:
  selector:
    app: metrics-app       # matches Deployment labels
  ports:
    - name: http-metrics
      port: 9102
      targetPort: 9102
      protocol: TCP        # Prometheus scrapes via TCP
