apiVersion: opentelemetry.io/v1alpha1
kind: OpenTelemetryCollector
metadata:
  name: otel-collector-ta
  namespace: observability
spec:
  mode: statefulset
  replicas: 2
  targetAllocator:
    enabled: true
    prometheusCR:
      enabled: true
  config: |
    receivers:
      prometheus:
        config: {}
    exporters:
      otlp:
        endpoint: mimir:4317
        tls:
          insecure: true
    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          exporters: [otlp]






---

kubectl apply -f - <<EOF
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: collector-with-ta
spec:
  mode: statefulset
  targetAllocator:
    enabled: true
  config:
    receivers:
      prometheus:
        config:
          scrape_configs:
          - job_name: 'otel-collector'
            scrape_interval: 10s
            static_configs:
            - targets: [ '0.0.0.0:8888' ]
            metric_relabel_configs:
            - action: labeldrop
              regex: (id|name)
            - action: labelmap
              regex: label_(.+)
              replacement: $$1

    exporters:
      debug: {}

    service:
      pipelines:
        metrics:
          receivers: [prometheus]
          exporters: [debug]
EOF