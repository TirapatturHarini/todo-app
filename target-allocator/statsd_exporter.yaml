apiVersion: apps/v1
kind: Deployment
metadata:
  name: statsd-exporter
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: statsd-exporter
  template:
    metadata:
      labels:
        app: statsd-exporter
    spec:
      containers:
        - name: statsd-exporter
          image: prom/statsd-exporter:v0.26.0
          ports:
            - name: statsd
              containerPort: 9125
              protocol: UDP
            - name: metrics
              containerPort: 9102
              protocol: TCP
---
apiVersion: v1
kind: Service
metadata:
  name: statsd-exporter
  namespace: observability
spec:
  selector:
    app: statsd-exporter
  ports:
    - name: statsd
      port: 9125
      protocol: UDP
      targetPort: 9125
    - name: metrics
      port: 9102
      protocol: TCP
      targetPort: 9102
