apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-app
  namespace: test
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-application
  template:
    metadata:
      labels:
        app: metrics-application
    spec:
      containers:
        - name: metrics-application
          image: harinitirapattur/metrics-app:latest
          ports:
            - containerPort: 9102
---
apiVersion: v1
kind: Service
metadata:
  name: metrics-application
  namespace: test
spec:
  selector:
    app: metrics-application
  ports:
    - name: http-metrics
      port: 9102
      targetPort: 9102
      protocol: TCP
